# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/movie_booking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Schema init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# JWT
jwt.secret=movieBookingSecretKey2024SuperSecureKeyForJWTToken123456
jwt.expiration=86400000

# Logging
logging.level.com.moviebooking=DEBUG
logging.level.org.springframework.jdbc=DEBUG
