# Server — Railway sets PORT automatically
server.port=${PORT:8080}

# Database
# Railway MySQL plugin provides these env vars (referenced in web service variables tab)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:${MYSQL_DATABASE:movie_booking_db}}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Schema init — only run if connection succeeds; errors are ignored for re-runs
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# JWT
jwt.secret=${JWT_SECRET:movieBookingSecretKey2024SuperSecureKeyForJWTToken123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.moviebooking=INFO
