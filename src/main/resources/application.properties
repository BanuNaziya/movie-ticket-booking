# Server — Railway sets PORT automatically
server.port=${PORT:8080}

# Database
# Railway MySQL plugin provides: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Falls back to local values when running locally
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:movie_booking_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Schema init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# JWT
jwt.secret=${JWT_SECRET:movieBookingSecretKey2024SuperSecureKeyForJWTToken123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.moviebooking=INFO
